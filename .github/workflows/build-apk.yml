name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout do repositório ─────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Java (necessário para build Android) ────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Flutter ─────────────────────────────────────────────────────────
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"   # versão estável compatível com Flet 0.28.x
          channel: "stable"
          cache: true

      # ── 5. Android SDK (licenças + build-tools) ────────────────────────────
      - name: Aceitar licenças do Android SDK
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || \
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || \
          true

      - name: Instalar componentes do Android SDK
        run: |
          SDK=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ ! -f "$SDK" ]; then SDK=$ANDROID_HOME/tools/bin/sdkmanager; fi
          $SDK \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" 2>/dev/null || true

      # ── 6. Dependências nativas do sistema (para compilar bsdiff4) ─────────
      - name: Instalar dependências nativas
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            libffi-dev

      # ── 7. Instalar Flet CLI ───────────────────────────────────────────────
      - name: Instalar Flet
        run: |
          pip install --upgrade pip
          pip install "flet==0.28.3"

      # ── 8. Instalar demais dependências do projeto ─────────────────────────
      - name: Instalar dependências do projeto
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # ── 9. Diagnóstico Flutter ─────────────────────────────────────────────
      - name: Flutter Doctor (diagnóstico)
        run: flutter doctor -v
        # Não falha o build — apenas exibe o relatório para análise

      # ── 10. Verificar estrutura do projeto Flet ────────────────────────────
      - name: Verificar entrypoint do projeto
        run: |
          echo "=== Listagem da raiz do projeto ==="
          ls -la
          echo "=== Conteúdo de main.py (primeiras 10 linhas) ==="
          head -10 main.py || echo "AVISO: main.py não encontrado na raiz!"

      # ── 11. Build do APK ───────────────────────────────────────────────────
      - name: Compilar APK com Flet
        run: |
          flet build apk \
            --project "Patcher Mobile" \
            --description "Gerenciador de Patches - TicoDoido" \
            --org "com.tico.patcher" \
            --verbose
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 12. Localizar o APK gerado ────────────────────────────────────────
      - name: Localizar APK gerado
        run: |
          echo "=== Procurando APKs em todo o diretório ==="
          find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado!"
          echo "=== Conteúdo de build/ ==="
          ls -la build/ 2>/dev/null || echo "Pasta build/ nao existe"
          ls -la build/apk/ 2>/dev/null || echo "Pasta build/apk/ nao existe"

      # ── 13. Upload do APK como artefato ───────────────────────────────────
      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: patcher-mobile-apk
          path: build/apk/*.apk
          if-no-files-found: error
          retention-days: 7
